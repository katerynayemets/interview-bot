apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: interview-bot
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: interview-bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: interview-bot
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z postgres 5432; do echo "[init] waiting for postgres..."; sleep 2; done'
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z redis 6379; do echo "[init] waiting for redis..."; sleep 2; done'
      containers:
        - name: worker
          image: interview-bot:k8s
          imagePullPolicy: Never
          command: ["/usr/local/bin/entrypoint.sh"]
          args: ["celery", "-A", "app.worker.celery_app:celery", "worker", "-l", "INFO", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: interview-bot-config
            - secretRef:
                name: interview-bot-secret
          env:
            - name: RUN_MIGRATIONS
              value: "0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
