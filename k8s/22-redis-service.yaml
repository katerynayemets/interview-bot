apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: interview-bot
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: interview-bot
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
