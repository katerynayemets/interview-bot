apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: interview-bot
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: interview-bot
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
