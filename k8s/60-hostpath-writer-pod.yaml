apiVersion: v1
kind: Pod
metadata:
  name: hostpath-writer
  namespace: interview-bot
  labels:
    app.kubernetes.io/name: hostpath-writer
    app.kubernetes.io/part-of: interview-bot
    demo: hostpath-cross-pod
spec:
  restartPolicy: Always
  containers:
    - name: writer
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          echo "[writer] starting heartbeat loop -> /shared/heartbeat.log"
          mkdir -p /shared
          while true; do
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) heartbeat from $(hostname)" >> /shared/heartbeat.log
            sleep 2
          done
      volumeMounts:
        - name: shared-node-dir
          mountPath: /shared
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 32Mi
  volumes:
    - name: shared-node-dir
      hostPath:
        path: /tmp/interview-bot-shared
        type: DirectoryOrCreate
