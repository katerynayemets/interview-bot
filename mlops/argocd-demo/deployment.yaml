apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-demo
  namespace: argocd-demo
  labels:
    app.kubernetes.io/name: argocd-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - { name: http, containerPort: 80 }
          volumeMounts:
            - name: index
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
      volumes:
        - name: index
          configMap:
            name: demo-index
